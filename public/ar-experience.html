<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لعبة فرقعة البالونات AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <!-- AR Component -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #ui-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10; display: flex; flex-direction: column;
    }
    #score-board {
      background: rgba(255,255,255,0.8); padding: 15px 30px; border-radius: 30px;
      margin: 20px auto; font-size: 24px; font-weight: bold; color: #E91E63;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); pointer-events: auto;
    }
    .crosshair {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.5); border-radius: 50%;
      pointer-events: none;
    }
    .crosshair::after {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 6px; height: 6px; background: white; border-radius: 50%;
    }
  </style>
  <script>
    let score = 0;
    
    // Component to handle balloon behavior
    AFRAME.registerComponent('balloon', {
      init: function () {
        this.el.addEventListener('click', () => {
          // Pop balloon!
          score += 10;
          document.getElementById('score-text').innerText = 'النقاط: ' + score;
          
          // Shrink animation before removing
          this.el.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 150; easing: easeInQuad');
          setTimeout(() => {
            if (this.el.parentNode) {
              this.el.parentNode.removeChild(this.el);
            }
          }, 150);
          
          spawnBalloon(); // Spawn a new one immediately!
        });
      },
      tick: function (time, timeDelta) {
        // Float upwards
        let pos = this.el.getAttribute('position');
        pos.y += 0.002 * timeDelta;
        this.el.setAttribute('position', pos);
        
        // Remove if it goes too high
        if (pos.y > 5) {
          if (this.el.parentNode) {
            this.el.parentNode.removeChild(this.el);
            spawnBalloon();
          }
        }
      }
    });

    const colors = ['#FF1744', '#00E676', '#2979FF', '#FFEA00', '#D500F9', '#FF9100'];

    function spawnBalloon() {
      const scene = document.querySelector('a-scene');
      const balloon = document.createElement('a-entity');
      
      // Random position around the user
      const x = (Math.random() - 0.5) * 6; // -3 to 3
      const y = (Math.random() - 0.5) * 2 - 1; // -2 to 0
      const z = -2 - Math.random() * 4; // -2 to -6
      
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      balloon.setAttribute('position', `${x} ${y} ${z}`);
      balloon.setAttribute('balloon', '');
      
      // Create the sphere
      const sphere = document.createElement('a-sphere');
      sphere.setAttribute('radius', '0.4');
      sphere.setAttribute('color', color);
      sphere.setAttribute('material', 'opacity: 0.9; roughness: 0.2; metalness: 0.1');
      
      // Create the knot
      const knot = document.createElement('a-cone');
      knot.setAttribute('radius-bottom', '0.05');
      knot.setAttribute('radius-top', '0.01');
      knot.setAttribute('height', '0.1');
      knot.setAttribute('color', color);
      knot.setAttribute('position', '0 -0.4 0');
      
      balloon.appendChild(sphere);
      balloon.appendChild(knot);
      
      // Add class for raycaster to the sphere so it detects the mesh
      sphere.setAttribute('class', 'clickable');
      
      // Add floating animation
      balloon.setAttribute('animation__wobble', `property: position; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true; to: ${x+0.2} ${y} ${z}`);
      
      scene.appendChild(balloon);
    }

    window.onload = () => {
      // Spawn initial balloons
      for (let i = 0; i < 8; i++) {
        setTimeout(spawnBalloon, i * 500);
      }
    };
  </script>
</head>
<body>
  <div id="ui-container">
    <div id="score-board"><span id="score-text">النقاط: 0</span> 🎈</div>
    <div class="crosshair"></div>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="antialias: true; alpha: true" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
    <!-- Camera -->
    <a-entity camera position="0 1.6 0" look-controls></a-entity>
    
    <!-- Lighting -->
    <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.5" position="-1 2 1"></a-light>
  </a-scene>
</body>
</html>
