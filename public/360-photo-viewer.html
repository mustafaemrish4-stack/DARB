<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>360 Photo Viewer</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; }
      #fs-btn {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #2979FF;
        color: white;
        border: none;
        border-radius: 40px;
        padding: 15px 30px;
        font-size: 20px;
        font-family: sans-serif;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <button id="fs-btn">تكبير الشاشة</button>
    <a-scene 
      embedded 
      vr-mode-ui="enabled: true" 
      loading-screen="dotsColor: white; backgroundColor: black"
      device-orientation-permission-ui="enabled: true"
    >
      <a-sky id="sky" rotation="0 -90 0"></a-sky>
      <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true; mouseEnabled: true"></a-entity>
    </a-scene>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const imgSrc = urlParams.get('image');
      if (imgSrc) {
        document.getElementById('sky').setAttribute('src', imgSrc);
      }

      document.getElementById('fs-btn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
            console.log(`Error attempting to enable fullscreen: ${err.message}`);
          });
        } else {
          document.exitFullscreen();
        }
      });
    </script>
  </body>
</html>
