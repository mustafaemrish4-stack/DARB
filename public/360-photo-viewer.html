<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>360 Photo Viewer</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; }
    </style>
  </head>
  <body>
    <a-scene 
      embedded 
      vr-mode-ui="enabled: true" 
      loading-screen="dotsColor: white; backgroundColor: black"
      device-orientation-permission-ui="enabled: true"
    >
      <a-sky id="sky" rotation="0 -90 0"></a-sky>
      <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true; mouseEnabled: true"></a-entity>
    </a-scene>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const imgSrc = urlParams.get('image');
      if (imgSrc) {
        document.getElementById('sky').setAttribute('src', imgSrc);
      }
    </script>
  </body>
</html>
